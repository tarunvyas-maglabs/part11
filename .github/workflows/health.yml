name: Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
  
jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
      - name: Check the deployed service URL
        uses: Jtalk/url-health-check-action@v5
        with:
          url: ${{ secrets.FLY_URL }}
          max-attempts: 3
          retry-delay: 5s
