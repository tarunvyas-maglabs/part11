name: Deployment pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm install

      - name: Check style
        run: npm run eslint

      - name: Run npm test
        run: npm run test

      - name: Run npm build
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm run test:e2e
  
  deploy:
    needs: [build_and_test]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && !contains(join(github.event.commits.*.message, ' '), '#skip') }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  
  tag_release:
    needs: [deploy]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && !contains(join(github.event.commits.*.message, ' '), '#skip') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'
      - name: Bump version and push tag
        uses: anothrNick/github-tag-action@4ed44965e0db8dab2b466a16da04aec3cc312fd8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: 'patch'

  notify_success:
    needs: [deploy]
    runs-on: ubuntu-latest
    if: ${{ success() && github.event_name == 'push' && !contains(join(github.event.commits.*.message, ' '), '#skip') }}
    steps:
      - name: Deployment successful notification
        uses: sarisia/actions-status-discord@v1
        with: 
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          content: "✅ **Deployment Successful!** A new version deployed to production"
          title: "Deployment Details"
          description: |
            **Commit:** ${{ github.sha }}
            **Message:** ${{ join(github.event.commits.*.message, ' ') }}
            **Actor:** ${{ github.actor }}

  notfify_failure:
    needs: [build_and_test, deploy, tag_release]
    runs-on: ubuntu-latest
    if: ${{ failure() }}
    steps:
      - name: Build failure notification  
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          content: "❌ **Build Failed!** The pipeline encountered an error"
          title: "Failure Details"
          description: |
            **Repository:** ${{ github.repository }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **Message:** ${{ join(github.event.commits.*.message, ' ') }}
            **Actor:** ${{ github.actor }}
            **Workflow**: ${{ github.workflow }}
            **Job**: ${{ github.job }}
            
            [View Commit](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            [View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
